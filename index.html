<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>梦尘花羽 - MC生存与小游戏服务器</title>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Noto Sans SC', Arial, sans-serif;
      background: linear-gradient(120deg,#a18cd1 0%, #fbc2eb 100%);
      min-height: 100vh;
      color: #2d2d2d;
    }
    header {
      background: rgba(255,255,255,0.80);
      box-shadow: 0 8px 32px rgba(100,0,100,.10);
      padding: 32px 0 18px 0;
      text-align: center;
    }
    .logo {
      font-family: 'ZCOOL XiaoWei', 'Noto Sans SC', cursive;
      font-size: 3.5rem;
      color: #9575cd;
      letter-spacing: 8px;
      text-shadow: 2px 2px 14px #fbc2eb41;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 1.3rem;
      color: #6c3483;
      font-weight: bold;
      letter-spacing: 2px;
    }
    nav {
      margin-top: 16px;
      text-align: center;
    }
    nav a {
      color: #7b1fa2;
      text-decoration: none;
      padding: 8px 24px;
      border-radius: 40px;
      margin: 0 4px;
      font-weight: bold;
      background: rgba(254,252,255,.1);
      transition: background 0.2s;
    }
    nav a:hover {
      background: #dfa2ff33;
      color: #260141;
    }
    .container {
      max-width: 960px;
      margin: 36px auto 0 auto;
      background: rgba(255,255,255,0.98);
      border-radius: 22px;
      box-shadow: 0 4px 48px #c68cfc27;
      padding: 36px;
      text-align: center;
    }
    .server-ip {
      font-size: 1.2rem;
      color: #8e44ad;
      background: #f3eaff;
      display: inline-block;
      padding: 8px 22px;
      border-radius: 18px;
      margin: 14px auto 20px;
      font-weight: bold;
      letter-spacing: 1px;
      box-shadow: 0 2px 12px #c194d633;
    }
    .features {
      margin: 36px 0 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
    }
    .feature-card {
      background: linear-gradient(120deg,#ffe2ec90,#e0d9ff90);
      border-radius: 14px;
      box-shadow: 0 4px 18px #e08bfa0f;
      padding: 24px 30px 16px 30px;
      width: 260px;
      min-width: 200px;
      max-width: 95vw;
      text-align: center;
      border: 1.5px solid #e7c6ff70;
      transition: transform 0.16s;
    }
    .feature-card:hover {
      transform: translateY(-4px) scale(1.03);
    }
    .feature-title {
      font-weight: bold;
      color: #8e24aa;
      font-size: 1.16rem;
      margin-bottom: 7px;
      letter-spacing:1px;
    }
    .feature-desc {
      font-size: 0.98rem;
      color: #463463;
    }
    .contact {
      margin-top:40px;
      font-size: 1.02rem;
      color: #9646a4;
    }
    footer {
      margin-top: 36px;
      text-align: center;
      font-size: .93rem;
      color: #afa6be;
      padding-bottom: 24px;
    }
    @media (max-width:600px){
      .container {
        padding: 20px 8px;
      }
      .features {
        flex-direction: column;
        align-items: center;
        gap: 18px;
      }
      .feature-card {
        width: 96vw;
        padding: 15px 4vw;
      }
      .logo {
        font-size: 2.2rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">梦尘花羽</div>
    <div class="subtitle">MC生存 & 小游戏服务器</div>
    <nav>
      <a href="#about">简介</a>
      <a href="#features">特色</
    </nav>
  </header>
  <main>
    <div class="container" id="about">
      <p style="font-size:1.15rem;line-height:2;">
        <b>梦尘花羽</b> —— 一个温馨有爱的Minecraft服务器，兼容多版本生存、休闲小游戏、全新冒险地图，欢迎各路玩家前来与朋友一起畅玩！
      </p>
      <div class="server-ip" id="join">
        服务器地址：<b>cattail.9666.fun:39857（RPG） cattail.9666.fun:38230（生存）</b>
      </div>

      <div id="features" class="features">
        <div class="feature-card">
          <div class="feature-title">原版生存</div>
          <div class="feature-desc">
            纯净无外挂，友好社区氛围，养老建筑、红石、探索，满足各类生存玩家梦想！
          </div>
        </div>
        <div class="feature-card">
          <div class="feature-title">多样小游戏</div>
          <div class="feature-desc">
            每日小游戏轮起床战争、跑酷、你建我猜等
      </div>
    </div>
  </main>
  <footer>
    &copy; 2026 梦尘花羽 MC服务器 | 祝您游戏愉快！
  </footer>
</body>
</html>
